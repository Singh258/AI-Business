<body><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dental Receptionist</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:60px 8%;
gap:60px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:320px;
}

.left h1{
font-size:54px;
line-height:1.2;
margin-bottom:20px;
}

.left p{
font-size:20px;
color:#cbd5e1;
margin-bottom:30px;
line-height:1.6;
}

button{
background:#38bdf8;
color:white;
padding:16px 35px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.chatbox{
flex:1;
min-width:330px;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.chat-header{
background:#2563eb;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
}

.chat-body{
padding:20px;
height:360px;
overflow:auto;
background:#f8fafc;
}

.bot{
background:#dbeafe;
padding:12px;
border-radius:10px;
margin-bottom:12px;
width:80%;
}

.user{
background:#2563eb;
color:white;
padding:12px;
border-radius:10px;
margin-left:auto;
margin-bottom:12px;
width:75%;
}

.chat-input{
display:flex;
padding:15px;
background:white;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:12px;
font-size:16px;
}

.chat-input button{
margin-left:10px;
padding:12px 25px;
}
</style>

</head>

<body>

<header>

<div class="logo">
🦷 Dental AI
</div>

</header>

<section class="hero">

<div class="left">

<h1>
AI Receptionist For Dental Clinics
</h1>

<p>

Never miss another patient.

Answer calls, book appointments and qualify new patients automatically 24/7.

</p>

<button>

Book Free Demo

</button>

</div>

<div class="chatbox">

<div class="chat-header">

Dental AI Receptionist

</div>

<div class="chat-body" id="chat">

<div class="bot">

👋 Hello!

Welcome to Smile Dental Clinic.

</div>

<div class="bot">

How may I help you today?

</div>

</div>

<div class="chat-input">

<input id="msg" placeholder="Type your message...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

</section>

<script>

function sendMessage(){

let input=document.getElementById("msg");

let chat=document.getElementById("chat");

if(input.value=="") return;

chat.innerHTML+=`
<div class="user">${input.value}</div>
`;

setTimeout(()=>{

chat.innerHTML+=`
<div class="bot">
Thank you.
Our AI receptionist has received your request.
A dentist will contact you shortly.
</div>
`;

chat.scrollTop=chat.scrollHeight;

},700);

input.value="";

}

</script>

</body>

</html>

</body>

</html>
